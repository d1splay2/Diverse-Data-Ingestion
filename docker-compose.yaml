services:
  rustfs:
    image: rustfs/rustfs:latest
    container_name: rustfs
    ports:
      - 9000:9000
      - 9001:9001
    environment:
      RUSTFS_REGION: us-east-1
    volumes:
      - rustfs:/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -f  http://127.0.0.1:9000/health" ]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  rustfs:
