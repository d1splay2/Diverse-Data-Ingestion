services:
  rustfs:
    image: rustfs/rustfs:latest
    container_name: rustfs
    env_file:
      - .env
    ports:
      - 9000:9000
      - 9001:9001
    environment:
      RUSTFS_REGION: us-east-1
    healthcheck:
      test: [ "CMD-SHELL", "curl -f  http://127.0.0.1:9000/health" ]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 7s
    networks:
      - test

  rustfs-integration:
    build: .
    image: rustfs-integration:latest
    container_name: rustfs-integration
    env_file:
      - .env
    volumes:
      - ./src:/opt/tests
      - ../../../docker/rustfs/:/opt/src
    depends_on:
      rustfs:
        condition: service_healthy
    command: sh -c 'python -m tests.test'
    networks:
      - test

networks:
  test:
